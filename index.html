    <script>
        // ==========================================
        // 3. ENGINE: GRAPH BUILDER & ROUTER
        // ==========================================
        const graph = {};
        const edgeDetails = {}; // Stores description of how they connect

        function initGraph(allowPaid, allowPremium) {
            for (let prop in graph) { delete graph[prop]; }

            const lines = csvData.trim().split('\n').slice(1);
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length < 5) return;
                
                // 1. Properly extract the first four fixed columns
                const start = parts[0].trim();
                const end = parts[1].trim();
                const weightStr = parts[2].trim();
                const edgeType = parts[3].trim();
                
                const u = start;
                const v = end;
                if (!u || !v) return;
                
                // Core check: If no paid rides allowed, kill everything paid
                if (!allowPaid && (edgeType.includes('paid') || edgeType === 'premium_train' || edgeType === 'fare_gate' || edgeType === 'residents_bus')) {
                    return; 
                }
                
                // Premium check: If paid is allowed but premium is unchecked, kill premium trains
                if (!allowPremium && edgeType === 'premium_train') {
                    return;
                }
                
                const w = parseInt(weightStr);

                // 2. Handle the optional 'uni' flag at the very end
                let dir = '';
                if (parts[parts.length - 1].trim() === 'uni') {
                    dir = 'uni';
                    parts.pop(); // Remove 'uni' so it doesn't get glued into the description
                }
                
                // 3. Glue the remaining parts back together as the description string
                let descStr = parts.slice(4).join(',').trim();
                
                // (Optional) Remove wrapping quotes if you used them in the CSV
                if (descStr.startsWith('"') && descStr.endsWith('"')) {
                    descStr = descStr.substring(1, descStr.length - 1);
                }

                if (!graph[u]) graph[u] = [];
                if (!graph[v]) graph[v] = [];

                const addEdge = (from, to, weight, eType, description) => {
                    let existingEdge = graph[from].find(e => e.node === to && e.weight === weight && e.type === eType);
                    if (existingEdge) {
                        if (!existingEdge.desc.includes(description)) {
                            existingEdge.desc += ' / ' + description;
                        }
                    } else {
                        graph[from].push({ node: to, weight: weight, type: eType, desc: description });
                    }
                };

                addEdge(u, v, w, edgeType, descStr);
                if (dir !== 'uni') {
                    addEdge(v, u, w, edgeType, descStr);
                }
            });
        }

        // Dijkstra's Algorithm implementation with route churn penalized
        function findShortestPath(start, end) {
            const distances = {};
            const prev = {};
            const queue = new Set();
            const TRANSFER_PENALTY = 5; // The mathematical weight added for changing routes

            // State is stored as "NodeID|VehicleDescription"
            distances[`${start}|`] = 0;
            queue.add(`${start}|`);

            let bestEndState = null;
            let minEndDist = Infinity;

            while (queue.size > 0) {
                let currState = null;
                for (let state of queue) {
                    if (currState === null || distances[state] < distances[currState]) currState = state;
                }
                queue.delete(currState);

                let currDist = distances[currState];
                let [currNode, currLine] = currState.split('|');

                // If we reach the end, log it, but keep checking in case a faster route exists
                if (currNode === end) {
                    if (currDist < minEndDist) {
                        minEndDist = currDist;
                        bestEndState = currState;
                    }
                    continue; 
                }

                if (!graph[currNode]) continue;

                for (let edge of graph[currNode]) {
                    // Identify if the next edge is a vehicle ride
                    const isVehicle = edge.type.includes('train') || edge.type.includes('bus') || edge.type.includes('rail');
                    let nextLine = isVehicle ? edge.desc : '';
                    let penalty = 0;

                    // 如果下一條邊需要搭乘交通工具
                    if (nextLine !== '') {
                        if (currLine === '') {
                            // 情境 1：從「步行狀態」上車
                            // 這會完美防堵「去商場洗底」的漏洞，因為只要上新車就要付等車成本 (TRANSFER_PENALTY)
                            penalty = TRANSFER_PENALTY;
                        } else {
                            // 情境 2：連續搭乘交通工具（車轉車）
                            const currRoutes = currLine.split(' / ');
                            const nextRoutes = nextLine.split(' / ');
                            
                            // 檢查是否為同一條路線（例如一直坐在荃灣綫上）
                            const intersection = currRoutes.find(r => nextRoutes.includes(r));

                            if (intersection) {
                                // 繼續留在同一次車上，無懲罰
                                nextLine = intersection; 
                            } else {
                                // 直接轉乘另一台不同路線的車，加上等車懲罰
                                penalty = TRANSFER_PENALTY; 
                            }
                        }
                    }

                    let alt = currDist + edge.weight + penalty;
                    let nextState = `${edge.node}|${nextLine}`;

                    if (distances[nextState] === undefined || alt < distances[nextState]) {
                        distances[nextState] = alt;
                        prev[nextState] = { state: currState, node: currNode, edge: edge };
                        queue.add(nextState);
                    }
                }
            }

            // Reconstruct the path and the specific edges taken
            let path = [];
            let routeEdges = [];
            let u = bestEndState;

            if (!u) return { path: [], edges: [] };

            while (u && prev[u]) {
                let p = prev[u];
                path.unshift(p.edge.node); 
                routeEdges.unshift(p.edge);
                u = p.state;
            }
            path.unshift(start);

            return { path: path, edges: routeEdges };
        }

		// ==========================================
        // 4. UI CONTROLLERS (Cascading Dropdowns)
        // ==========================================
        function initDropdowns() {
            const startRegion = document.getElementById('startRegion');
            const endRegion = document.getElementById('endRegion');
            
            // Populate the primary Regions
            for (const regionName in nodeDict) {
                const opt1 = document.createElement('option');
                const opt2 = document.createElement('option');
                opt1.value = opt2.value = regionName;
                opt1.textContent = opt2.textContent = regionName;
                startRegion.appendChild(opt1);
                endRegion.appendChild(opt2);
            }
        }

        function updateLocations(type) {
            const regionSelect = document.getElementById(type + 'Region');
            const nodeSelect = document.getElementById(type + 'Node');
            const selectedRegion = regionSelect.value;

            // Reset and lock the location dropdown if no region is selected
            nodeSelect.innerHTML = '<option value="">2. Select Location / 選擇地點...</option>';
            if (!selectedRegion) {
                nodeSelect.disabled = true;
                return;
            }

            // Unlock and populate based on the selected region
            nodeSelect.disabled = false;
            const districts = nodeDict[selectedRegion];

            for (const [districtName, nodes] of Object.entries(districts)) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = districtName;
                
                for (const [nodeId, displayName] of Object.entries(nodes)) {
                    const option = document.createElement('option');
                    option.value = nodeId;
                    option.textContent = displayName;
                    optgroup.appendChild(option);
                }
                nodeSelect.appendChild(optgroup);
            }
        }

        const reverseDict = {}; // Maps "🚆 Hong Kong..." -> { id: "hong_kong_platform", region: "..." }
        const nodeToSearchString = {}; // Helper to map "hong_kong_platform" -> "🚆 Hong Kong..."
        let allLocationsArray = []; // Stores our dictionary for the custom search filter

                        } else if (regionName === "MTR Concourses (港鐵大堂)") {

                        } else if (regionName === "Border Crossings (出入境管制站)") {

                        } else {

                            // 1. The Sniper Override (Hardcoded Exceptions)
                            if (nodeId === 'chater_garden' || nodeId === 'sai_lau_kok_garden') {

                                nodeId === 'hong_kong_velodrome') {
                                prefix = "🚲 "; // Cycling
                            } else if (nodeId === 'mid_levels_escalator') {
                                prefix = "🛗 "; // Infrastructure
                            } else if (
                                nodeId === 'aeon_style_whampoa' ||
                                nodeId === 'apm' ||
                                nodeId === 'argyle_centre' ||
                                nodeId === 'cdw_building' ||
                                nodeId === 'central_market' ||

                            ) {

                            }
                            // 2. The Shotgun (Broad Keyword Matching)
                            else if (lowerName.includes('pti') || lowerName.includes('bus terminus') || lowerName.includes('bus stop') || lowerName.includes('交匯處') || lowerName.includes('巴士總站')) {
                                prefix = "🚌 ";
                            } else if (lowerName.includes('estate') || lowerName.includes('court') || lowerName.includes('邨') || lowerName.includes('苑') || lowerName.includes('garden') || lowerName.includes('花園')) {
                                prefix = "🏘️ ";
                            } else if (lowerName.includes('mall') || lowerName.includes('plaza') || lowerName.includes('square') || lowerName.includes('shopping') || lowerName.includes('商場') || lowerName.includes('廣場')) {
                                prefix = "🛍️ ";
                            } else if (lowerName.includes('hotel') || lowerName.includes('酒店')) {
                                prefix = "🏨 ";
                            } else if (lowerName.includes('hospital') || lowerName.includes('醫院')) {
                                prefix = "🏥 ";
                            } else if (lowerName.includes('library') || lowerName.includes('圖書館')) {
                                prefix = "📚 ";
                            } else if (lowerName.includes('university') || lowerName.includes('campus') || lowerName.includes('ive') || lowerName.includes('大學')) {
                                prefix = "🎓 ";
                            } else if (lowerName.includes('sports') || lowerName.includes('stadium') || lowerName.includes('體育') || lowerName.includes('運動')) {
                                prefix = "🏸 ";

                                prefix = "🏛️ ";
                            } else if (
                                (lowerName.includes('market') || lowerName.includes('街市') || lowerName.includes('municipal services') || lowerName.includes('msb') || lowerName.includes('市政大廈')) && 
                                !lowerName.includes('tai po') && 
                                !lowerName.includes('大埔墟')
                            ) {
                                prefix = "🐟 ";
                            }
                        }
                        
                        allLocationsArray.push({ searchName: prefix + rawDisplayName, nodeId, regionName });
                    }
                }
            }
            
            allLocationsArray.sort((a, b) => a.searchName.localeCompare(b.searchName));
            
            allLocationsArray.forEach(loc => {
                reverseDict[loc.searchName] = { id: loc.nodeId, region: loc.regionName };
                nodeToSearchString[loc.nodeId] = loc.searchName; 
            });

            // Initialize the custom autocomplete event listeners
            setupAutocomplete('start');
            setupAutocomplete('end');
        }

        function setupAutocomplete(type) {
            const input = document.getElementById(type + 'Search');
            const dropdown = document.getElementById(type + 'Dropdown');

            // Listen for user typing
            input.addEventListener('input', function() {
                const val = this.value.toLowerCase();
                dropdown.innerHTML = ''; // Clear previous results
                
                if (!val) {
                    dropdown.classList.add('hidden');
                    return;
                }
                
                // Filter the dictionary based on input
                const matches = allLocationsArray.filter(loc => loc.searchName.toLowerCase().includes(val));
                
                if (matches.length > 0) {
                    dropdown.classList.remove('hidden');
                    
                    // Build the dropdown list visually
                    matches.forEach(match => {
                        const li = document.createElement('li');
                        li.className = 'p-3 hover:bg-blue-50 cursor-pointer border-b border-slate-100 text-sm text-slate-700';
                        li.textContent = match.searchName;
                        
                        // When a user clicks a dropdown item
                        li.onclick = () => {
                            input.value = match.searchName;
                            dropdown.classList.add('hidden');
                            syncFromSearch(type); // Pivot the cascade dropdowns
                        };
                        dropdown.appendChild(li);
                    });
                } else {
                    dropdown.classList.add('hidden');
                }
            });

            // Hide the dropdown if the user taps anywhere else on the screen
            document.addEventListener('click', (e) => {
                if (e.target !== input && e.target !== dropdown) {
                    dropdown.classList.add('hidden');
                }
            });
        }

        // UI Controller: Hides and deselects Premium toggle if Paid is disabled
        function togglePremiumVisibility() {
            const allowPaid = document.getElementById('allowPaid').checked;
            const premiumContainer = document.getElementById('premiumToggleContainer');
            const premiumCheckbox = document.getElementById('allowPremium');

            if (!allowPaid) {
                premiumCheckbox.checked = false; // Deselect
                premiumContainer.classList.replace('opacity-100', 'opacity-0');
                premiumContainer.classList.replace('max-h-10', 'max-h-0'); // Smooth collapse
            } else {
                premiumCheckbox.checked = true; // Auto-reselect when paid is toggled back on
                premiumContainer.classList.replace('opacity-0', 'opacity-100');
                premiumContainer.classList.replace('max-h-0', 'max-h-10');
            }
        }
        
        // Triggered when user manually uses the dropdowns
        function syncFromDropdown(type) {
            const nodeSelect = document.getElementById(type + 'Node');
            const searchInput = document.getElementById(type + 'Search');
            
            if (nodeSelect.value) {
                // Update the search box text to match the emoji version!
                searchInput.value = nodeToSearchString[nodeSelect.value];
            } else {
                searchInput.value = ''; 
            }
        }

        function syncFromSearch(type) {
            const searchInput = document.getElementById(type + 'Search');
            const selected = reverseDict[searchInput.value];
            
            if (selected) {
                document.getElementById(type + 'Region').value = selected.region;
                updateLocations(type); 
                document.getElementById(type + 'Node').value = selected.id;
            }
        }

        function getNodeName(id) {
            // Updated search logic to handle the new nested dictionary
            for (const region of Object.values(nodeDict)) {
                for (const district of Object.values(region)) {
                    if (district[id]) return district[id];
                }
            }
            return id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); 
        }

        function calculateRoute() {
            const startText = document.getElementById('startSearch').value;
            const endText = document.getElementById('endSearch').value;
            
            let start = null;
            let end = null;

            // First, try an exact match (if they used the dropdowns or autocomplete properly)
            if (reverseDict[startText]) start = reverseDict[startText].id;
            if (reverseDict[endText]) end = reverseDict[endText].id;

            // Fallback: If they just typed text and hit enter, try to find a partial match
            if (!start && startText) {
                const match = allLocationsArray.find(loc => loc.searchName.toLowerCase().includes(startText.toLowerCase()));
                if (match) {
                    start = match.nodeId;
                    document.getElementById('startSearch').value = match.searchName; // Auto-correct the input box
                }
            }
            if (!end && endText) {
                const match = allLocationsArray.find(loc => loc.searchName.toLowerCase().includes(endText.toLowerCase()));
                if (match) {
                    end = match.nodeId;
                    document.getElementById('endSearch').value = match.searchName; // Auto-correct the input box
                }
            }
            
            // Read both checkbox states
            const allowPaid = document.getElementById('allowPaid').checked; 
            const allowPremium = document.getElementById('allowPremium').checked; 
            
            const resultDiv = document.getElementById('result');
            const routeList = document.getElementById('routeList');

            if (!start || !end) {
                alert("Please select a valid location from the dropdown list.");
                resultDiv.classList.add('hidden');
                return;
            }
            if (start === end) {
                alert("You are already there!");
                resultDiv.classList.add('hidden');
                return;
            }
            
            // Pass BOTH parameters into the graph builder
            initGraph(allowPaid, allowPremium);
            
            const route = findShortestPath(start, end);
            const params = new URLSearchParams();
            params.set('from', start);
            params.set('to', end);
            params.set('paid', allowPaid ? '1' : '0');
            params.set('premium', allowPremium ? '1' : '0');
            const newURL = `${window.location.pathname}?${params.toString()}`;
            window.history.replaceState({}, '', newURL); // replaceState prevents filling up the back button history
            
            resultDiv.classList.remove('hidden');
            routeList.innerHTML = ''; // Clear previous

            if (route.path.length === 0) {
                routeList.innerHTML = '<li class="text-red-500">Sorry, these locations are not connected without an umbrella yet.</li>';
            } else {                
                // Build the step-by-step UI
                routeList.innerHTML += `<li class="font-bold text-blue-700">📍 Start at ${getNodeName(route.path[0])}</li>`;
                
                for (let i = 0; i < route.edges.length; i++) {
                    const v = route.edges[i].node;
                    const edge = route.edges[i];
                    
                    if (v.includes('spine') || v.includes('node') || v.includes('exit_e2') || v.includes('junction')) {
                        continue;
                    }

                    // --- SMART PREFIX LOGIC ---
                    // Determine if the description is a custom instruction or a standard noun
                    let viaPrefix = "via ";
                    const lowerDesc = edge.desc.toLowerCase();
                    if (lowerDesc.startsWith('follow') || lowerDesc.startsWith('walk') || lowerDesc.startsWith('take') || lowerDesc.startsWith('exit') || lowerDesc.startsWith('towards') || lowerDesc.startsWith('signs')) {
                        viaPrefix = ""; // Drop the 'via' for custom instructions
                    }
                    const displayDesc = viaPrefix + edge.desc;
                    // --------------------------

                    // Handle Continuous Rides (Paid Trains, Premium Trains, and Paid Buses)
                    const isRide = (edge.type === 'paid_train' || edge.type === 'premium_train' || edge.type === 'paid_bus');
                    
                    if (isRide) {
                        const nextEdge = route.edges[i+1]; // Look ahead
                        const isNextRide = (nextEdge && (nextEdge.type === 'paid_train' || nextEdge.type === 'premium_train' || nextEdge.type === 'paid_bus'));
                        
                        // Determine if the current merged route shares a specific vehicle with the next edge
                        let sharesRoute = false;
                        if (isNextRide) {
                            const currRoutes = edge.desc.split(' / ');
                            const nextRoutes = nextEdge.desc.split(' / ');
                            sharesRoute = currRoutes.some(r => nextRoutes.includes(r));
                        }
                        
                        // 1. Collapse the UI if staying on the same continuous route
                        if (isNextRide && sharesRoute) {
                            continue; 
                        }
                        
                        // 2. Render the ride instruction
                        let rideLabel = '🚆 Ride train to';
                        let borderClass = 'border-blue-600';
                        
                        if (edge.type === 'premium_train') {
                            rideLabel = '✈️ Board premium train to';
                            borderClass = 'border-teal-500 bg-teal-50/50 rounded-r-lg';
                        } else if (edge.type === 'paid_bus') {
                            rideLabel = '🚌 Ride bus to'; 
                            borderClass = 'border-green-500';
                        }

                        routeList.innerHTML += `
                        <li class="pl-4 border-l-4 ${borderClass} ml-2 py-2">
                            ${rideLabel} <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;

                        // 3. INJECT THE TRANSFER: If changing to a completely different route
                        if (isNextRide && !sharesRoute) {
                            routeList.innerHTML += `
                            <li class="pl-4 border-l-4 border-purple-400 ml-2 py-2 bg-purple-50/50 rounded-r-lg">
                                🔄 Transfer at <span class="font-semibold">${getNodeName(v)}</span> 
                                <br><span class="text-xs text-slate-500">Wait for ${nextEdge.desc}</span>
                            </li>`;
                        }
                    }

                    // Handle Fare Gates (Dynamic Enter vs Exit)
                    else if (edge.type === 'fare_gate') {
                        const isEnteringPaid = v.includes('platform');
                        
                        if (isEnteringPaid) {
                            routeList.innerHTML += `
                            <li class="pl-4 border-l-4 border-orange-400 ml-2 py-2 bg-orange-50/50 rounded-r-lg">
                                🎫 Enter paid area at <span class="font-semibold">${getNodeName(v)}</span> 
                                <br><span class="text-xs text-slate-500">${displayDesc}</span>
                            </li>`;
                        } else {
                            routeList.innerHTML += `
                            <li class="pl-4 border-l-4 border-orange-400 ml-2 py-2 bg-orange-50/50 rounded-r-lg">
                                🎫 Exit paid area to <span class="font-semibold">${getNodeName(v)}</span> 
                                <br><span class="text-xs text-slate-500">${displayDesc}</span>
                            </li>`;
                        }
                    }
                    // Handle Paid Tunnels (e.g. Central to Hong Kong)
                    else if (edge.type === 'paid_tunnel') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-4 border-blue-400 ml-2 py-2 bg-blue-50/50 rounded-r-lg">
                            🚶 Walk through paid tunnel to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Internal Station Transfers (e.g., Admiralty Island Line to East Rail Line)
                    else if (edge.type === 'paid_transfer') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-4 border-purple-400 ml-2 py-2 bg-purple-50/50 rounded-r-lg">
                            🔄 Transfer within paid area to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Franchised Buses & Minibuses
                    else if (edge.type === 'paid_bus') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-4 border-green-500 ml-2 py-2">
                            🚌 Board bus to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Free Estate/Mall Shuttles
                    else if (edge.type === 'free_shuttle') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-4 border-teal-500 ml-2 py-2">
                            🚐 Take free shuttle to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Paid Residents' Shuttles
                    else if (edge.type === 'residents_bus') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-4 border-emerald-500 ml-2 py-2">
                            🏘️ Board residents' bus to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Lifts
                    else if (edge.type === 'lift') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-2 border-blue-300 ml-2 py-1">
                            🛗 Take lift to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Escalators
                    else if (edge.type === 'escalator') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-2 border-silver-300 ml-2 py-1">
                            🚶 Take escalator to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }// Handle Free Tunnels
                    else if (edge.type === 'tunnel') {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-2 border-blue-300 ml-2 py-1">
                            🚶 Walk through pedestrian tunnel to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                    // Handle Normal Walking
                    else {
                        routeList.innerHTML += `
                        <li class="pl-4 border-l-2 border-slate-300 ml-2 py-1">
                            🚶 Walk to <span class="font-semibold">${getNodeName(v)}</span> 
                            <br><span class="text-xs text-slate-500">${displayDesc}</span>
                        </li>`;
                    }
                }
                routeList.innerHTML += `<li class="font-bold text-green-700 mt-2">🏁 Arrive at ${getNodeName(route.path[route.path.length - 1])}</li>`;
            }

            resultDiv.classList.remove('hidden');
        }

        function swapLocations() {
            const startInput = document.getElementById('startSearch');
            const endInput = document.getElementById('endSearch');
            
            // Swap the text
            const tempText = startInput.value;
            startInput.value = endInput.value;
            endInput.value = tempText;
            
            // Clear the dropdowns so they don't visually conflict with the swapped text
            document.getElementById('startNode').value = '';
            document.getElementById('endNode').value = '';
            
            // Automatically calculate the new route
            if (startInput.value && endInput.value) {
                calculateRoute();
            }
        }

        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            const fromId = params.get('from'); // Getting the clean ID (e.g. "fou_wah_centre")
            const toId = params.get('to');
            const paid = params.get('paid');
            const premium = params.get('premium');
            
            let shouldCalculate = false;
            
            if (paid !== null) {
                document.getElementById('allowPaid').checked = (paid === '1');
                togglePremiumVisibility(); 
            }
            if (premium !== null) {
                document.getElementById('allowPremium').checked = (premium === '1');
            }
            
            if (fromId && nodeToSearchString[fromId]) {
                document.getElementById('startSearch').value = nodeToSearchString[fromId];
                shouldCalculate = true;
            }
            if (toId && nodeToSearchString[toId]) {
                document.getElementById('endSearch').value = nodeToSearchString[toId];
                shouldCalculate = true;
            }
            
            if (shouldCalculate && fromId && toId) {
                setTimeout(calculateRoute, 100); 
            }
        }

        async function shareRoute() {
            const currentUrl = window.location.href;
            
            // Check if the user has selected a start and end destination yet
            const startId = document.getElementById('startSearch').value;
            const endId = document.getElementById('endSearch').value;
            
            let shareText = "Check out this indoor route on RainGuide HK!";
            if (startId && endId) {
                shareText = `Here is the dry route from ${startId} to ${endId}!`;
            }

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'RainGuide HK Route',
                        text: shareText,
                        url: currentUrl
                    });
                } catch (error) {
                    console.log('Error sharing or share cancelled');
                }
            } else {
                // Fallback for desktop browsers without native sharing
                try {
                    await navigator.clipboard.writeText(currentUrl);
                    alert("Route link copied to clipboard!");
                } catch (err) {
                    alert("Failed to copy link. You can manually copy the URL from the address bar.");
                }
            }
        }

        // Initialize App
		const initialPaidState = document.getElementById('allowPaid').checked;
        const initialPremiumState = document.getElementById('allowPremium').checked;
        
		initGraph(initialPaidState, initialPremiumState);
	    initSearchBox();
        initDropdowns();
        loadFromURL();
    </script>
</body>
